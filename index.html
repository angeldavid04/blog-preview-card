<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="css/styles.css">

  <title>Frontend Mentor | Blog preview card</title>
</head>
<body>

  <main>
    <article class="card">
      <img src="assets/images/illustration-article.svg" alt="coding illustration" class="card__image">
      <div class="card__body">
        <span class="card__badge">Learning</span>
        <time datetime="2023-12-21" class="card__date">Published 21 Dec 2023</time>
        <h1 class="card__title">HTML & CSS foundations</h1>
        <p class="card__content">
          These languages are the backbone of every website, defining structure, content, and
          presentation.
        </p>
      </div>
      <div class="card__footer">
        <img src="assets/images/image-avatar.webp" alt="Photo of the author" class="card__author-image">
        <p class="card__author">Greg Hooper</p>
      </div>
    </article>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Angel</a>.
  </footer>
</body>
</html>
